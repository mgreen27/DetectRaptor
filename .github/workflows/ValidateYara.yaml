name: Validate generated YARA

on:
  workflow_run:
    workflows:
      - Weekly yara file update
      - Weekly yara process update
      - Weekly webshell update
    types:
      - completed
  workflow_dispatch:

jobs:
  validate:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
        ref: master

    - name: Download Velociraptor binaries
      run: |
          VERSION="$(
            curl -s https://api.github.com/repos/Velocidex/velociraptor/releases/latest \
            | grep '"tag_name":' \
            | cut -d '"' -f 4 \
            | sed 's/^v//'
          )"
          LINUX="$(
            curl -s https://api.github.com/repos/Velocidex/velociraptor/releases/tags/v$VERSION \
            | grep browser_download_url \
            | cut -d '"' -f 4 \
            | grep 'linux-amd64-musl$' \
            | head -n 1
          )"
          echo "VERSION=$VERSION"
          echo "LINUX=$LINUX"
          test -n "$LINUX"
          curl -L "$LINUX" -o ./velociraptor
          chmod +x ./velociraptor
          ./velociraptor version

    - name: Validate generated YARA bundles
      run: bash ./scripts/validate_yara_with_velociraptor.sh
